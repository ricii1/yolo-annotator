<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOLO Annotator</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>YOLO Annotator</h1>
      <div class="actions">
        <label class="btn">
          Upload
          <input id="upload" type="file" accept="image/*" multiple hidden />
        </label>
        <label class="btn">
          Import Roboflow zip
          <input id="import" type="file" accept=".zip,application/zip" hidden />
        </label>
        <button id="scan" class="btn">Scan folder</button>
        <button id="export" class="btn primary">Export YOLO11</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="filter">
          <div class="filter-head">
            <h2>Filter</h2>
            <button id="filter-clear" class="link">clear</button>
          </div>
          <label class="check"><input type="checkbox" id="filter-unlabeled" /> Only images with no boxes</label>
          <div id="filter-classes" class="filter-classes"></div>
          <p class="legend"><span class="tag inc">include</span><span class="tag exc">exclude</span> — click a class to cycle</p>
        </div>
        <div class="filter-head">
          <h2>Images</h2>
          <span id="image-count" class="count"></span>
        </div>
        <div id="gallery" class="gallery"></div>
        <div class="pager">
          <button id="page-prev" class="btn small">‹ Prev</button>
          <span id="page-info" class="page-info"></span>
          <button id="page-next" class="btn small">Next ›</button>
        </div>
      </aside>

      <section class="stage">
        <div class="stage-head">
          <span id="image-title" class="image-title">Select an image</span>
          <span id="status" class="status"></span>
        </div>
        <div class="canvas-wrap">
          <canvas id="canvas"></canvas>
        </div>
        <div class="stage-tools">
          <button id="autolabel" class="btn">✨ Auto-label</button>
          <label class="num">conf <input id="conf" type="number" min="0" max="1" step="0.05" value="0.25" /></label>
          <label class="num">overlap <input id="iou" type="number" min="0" max="1" step="0.05" value="0.45" /></label>
          <label class="check inline"><input type="checkbox" id="auto-on-open" checked /> auto-label on open</label>
          <label class="check inline"><input type="checkbox" id="auto-save" checked /> auto-save</label>
          <button id="save" class="btn primary" disabled>Save</button>
          <span class="hint">← → / s switch image · 1-0 pick class · a auto-label · drag to draw · click to select · Delete to remove</span>
        </div>
      </section>

      <aside class="panel">
        <h2>Classes</h2>
        <div id="class-list" class="class-list"></div>
        <h2>Boxes</h2>
        <div id="box-list" class="box-list"></div>
      </aside>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/canvas.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
